<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>성범죄 연예인 자숙기간 시각화</title>
<style>
  body { background:transparent; margin:0; padding:40px 20px; min-height:100vh; box-sizing:border-box; display:flex; justify-content:center; align-items:center; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Malgun Gothic", sans-serif; }
  .viz-container { width:100%; max-width:1150px; }
</style>
</head>
<body>
<div class="viz-container">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">성범죄 연예인 자숙기간, 형량은 원본 엑셀 표기 그대로, 미복귀는 점선</h2>
<div id="barWrap" style="position: relative; overflow-x: auto; display:flex; justify-content:center;">
  <div id="barList" style="min-width: 1050px; position: relative;"></div>
</div>
<div id="tip" style="position: fixed; display: none; pointer-events: none; background: #2c2c2a; border: 0.5px solid #6a695f; border-radius: 8px; padding: 12px 16px; font-size: 14px; color: #ffffff; white-space: nowrap; z-index: 1000; line-height: 1.8;"></div>
<script>
function fmtYM(dur) {
  let years = Math.floor(dur);
  let months = Math.round((dur - years) * 12);
  if (months === 12) { years += 1; months = 0; }
  if (years > 0 && months > 0) return years + '년 ' + months + '개월';
  if (years > 0) return years + '년';
  return months + '개월';
}
const rows = [
  {name:'힘찬(1차)', group:'징역형', segs:[[2.42,'free'],[0.83,'jail']], dashColor:'#e34948', squareEnd:false,
   info:{최초보도:'2018.09', 구속일자:'2021.02', 출소일:'2021.12', 복귀:'미복귀(2020.10.25 컴백 시도했으나 재판 중 음주운전 1회로 복귀 실패)', 형량:'징역형'}},
  {name:'힘찬(2·3차)', group:'집행유예', segs:[[2.08,'g']], dashColor:'#eda100', squareEnd:true, isSingle:true,
   info:{최초보도:'2022.04(한남동 강제추행) / 2022.05(은평구 강간·불법촬영)', 구속일자:'없음(집행유예)', 출소일:'없음', 복귀:'미복귀(2024.05 선고 확정으로 사건 자체는 종결)', 형량:'징역형 집행유예', 비고:'항소심 진행 중이던 1차 사건과 별개로 추가 발생한 사건, 검찰 구형은 징역 7년이었으나 피해자 합의 등 참작되어 집행유예 확정'}},
  {name:'강지환', group:'집행유예', segs:[[0.42,'g']], dashColor:'#eda100', squareEnd:true, isSingle:true,
   info:{최초보도:'2019.07', 구속일자:'2019.07(구치소 구금)', 출소일:'2019.12(1심 집행유예 석방)', 복귀:'미복귀', 형량:'징역형 집행유예'}},
  {name:'정준영', group:'징역형', segs:[[1.17,'free'],[3.58,'jail']], dashColor:'#e34948', squareEnd:false,
   info:{최초보도:'2019.07', 구속일자:'2020.09', 출소일:'2024.04', 복귀:'미복귀', 형량:'징역형'}},
  {name:'승리', group:'징역형', segs:[[3.33,'free'],[0.76,'jail']], dashColor:'#e34948', squareEnd:false,
   info:{최초보도:'2019.01', 구속일자:'2022.05', 출소일:'2023.02', 복귀:'미복귀', 형량:'징역형'}},
  {name:'뱃사공', group:'징역형', segs:[[1.25,'free'],[1.00,'jail']], dashColor:null, squareEnd:false,
   info:{최초보도:'2022.01', 구속일자:'2023.04', 출소일:'2024.04', 복귀:'2024.02', 형량:'징역형', 비고:'첫 앨범 발매(복귀 기록상 2024.02)가 출소(2024.04)보다 앞서 있어 경위 확인 필요(사전 발매 추정)'}},
  {name:'유영재', group:'징역형', segs:[[0.81,'free'],[1.44,'jail']], dashColor:'#f7c1c1', squareEnd:true,
   info:{최초보도:'2024.04', 구속일자:'2025.01', 출소일:'없음(현재 수감 중)', 복귀:'미복귀', 형량:'징역형', 비고:'친족관계에 의한 강제추행'}},
  {name:'문태일', group:'징역형', segs:[[0.94,'free'],[0.98,'jail']], dashColor:'#f7c1c1', squareEnd:true,
   info:{최초보도:'2024.08', 구속일자:'2025.07', 출소일:'없음(현재 수감 중)', 복귀:'미복귀', 형량:'징역형', 비고:'특수강간죄'}}
];
const jailColor = {'free':'#e34948','jail':'#f7c1c1'};
const groupColor = {'집행유예':'#eda100'};
const pxPerYear = 100;
const axisMaxYear = 6;
const axisWidth = axisMaxYear * pxPerYear;
const labelW = 120, gapW = 14;
let html = '';

function buildTooltip(name, info) {
  let s = '<div style="font-weight:600; margin-bottom:4px;">' + name + '</div>';
  s += '<div>최초보도: ' + info.최초보도 + '</div>';
  s += '<div>구속일자: ' + (info.구속일자 || '없음(집행유예)') + '</div>';
  s += '<div>출소일: ' + (info.출소일 || '없음') + '</div>';
  s += '<div>복귀: ' + info.복귀 + '</div>';
  s += '<div>형량: ' + info.형량 + '</div>';
  if (info.비고) s += '<div style="max-width:320px; white-space:normal;">비고: ' + info.비고 + '</div>';
  return s;
}

rows.forEach((r) => {
  const total = r.segs.reduce((a, s) => a + s[0], 0);
  let barEndPx = 0;
  const tooltipHtml = buildTooltip(r.name, r.info).replace(/"/g, '&quot;');
  html += '<div style="display:flex; align-items:center; gap:14px; padding:8px 0;">';
  html += '<div style="width:120px; flex-shrink:0; font-size:15px; color:#f5f5f2; text-align:right; font-weight:500;">' + r.name + '</div>';
  html += '<div style="display:flex; align-items:center; height:32px;">';
  html += '<div class="bar" data-tip="' + tooltipHtml + '" style="cursor:pointer; display:flex; height:32px; align-items:center;">';
  r.segs.forEach((seg, si) => {
    if (seg[0] <= 0) return;
    const w = Math.max(seg[0] * pxPerYear, 4);
    barEndPx += w;
    const isFirst = si === 0 || r.segs.slice(0, si).every(s => s[0] <= 0);
    const isLast = si === r.segs.length - 1;
    const leftR = isFirst ? '6px' : '0';
    const rightR = (isLast && !r.squareEnd) ? '6px' : '0';
    const radius = leftR + ' ' + rightR + ' ' + rightR + ' ' + leftR;
    const color = r.isSingle ? groupColor[r.group] : jailColor[seg[1]];
    html += '<div style="width:' + w.toFixed(0) + 'px; height:32px; background:' + color + '; border-radius:' + radius + '; margin-right:1px;"></div>';
  });
  if (r.dashColor) {
    const dashW = Math.max(axisWidth - barEndPx, 0);
    html += '<div style="width:' + dashW.toFixed(0) + 'px; height:32px; position:relative;">';
    html += '<div style="position:absolute; top:0; left:0; right:0; border-top:2px dashed ' + r.dashColor + ';"></div>';
    html += '<div style="position:absolute; bottom:0; left:0; right:0; border-bottom:2px dashed ' + r.dashColor + ';"></div>';
    html += '</div>';
  }
  html += '</div>';
  html += '<span style="font-size:15px; color:#e8e7e0; margin-left:10px;">' + fmtYM(total) + (r.dashColor ? '~' : '') + '</span>';
  html += '</div></div>';
});

function axisRow(maxYear) {
  let s = '<div style="display:flex; align-items:center; gap:14px; padding:10px 0 2px; border-top: 0.5px solid #6a695f; margin-top: 8px;">';
  s += '<div style="width:120px; flex-shrink:0;"></div>';
  s += '<div style="position:relative; height:20px; width:' + (maxYear * pxPerYear + 20) + 'px;">';
  for (let yr = 0; yr <= maxYear; yr++) {
    s += '<span style="position:absolute; left:' + (yr * pxPerYear) + 'px; font-size:13px; color:#c9c7bf;">' + yr + '년</span>';
  }
  s += '</div></div>';
  return s;
}

document.getElementById('barList').innerHTML = html + axisRow(axisMaxYear);

const tip = document.getElementById('tip');
const wrap = document.getElementById('barWrap');
document.querySelectorAll('.bar').forEach(function(el){
  el.addEventListener('mouseenter', function(){
    el.style.opacity = '0.75';
    tip.innerHTML = el.getAttribute('data-tip');
    tip.style.display = 'block';
  });
  el.addEventListener('mousemove', function(e){
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
  });
  el.addEventListener('mouseleave', function(){
    el.style.opacity = '1';
    tip.style.display = 'none';
  });
});
</script>

</div>
</body>
</html>
