<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>음주운전 연예인 자숙기간 시각화</title>
<style>
  body { background:transparent; margin:0; padding:40px 20px; min-height:100vh; box-sizing:border-box; display:flex; justify-content:center; align-items:center; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Malgun Gothic", sans-serif; }
  .viz-container { width:100%; max-width:1150px; }
</style>
</head>
<body>
<div class="viz-container">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">음주운전 연예인 자숙기간, 년/개월 단위 표기, 평균선 포함</h2>
<div id="barWrap" style="position: relative; overflow-x: auto; display:flex; justify-content:center;">
  <div id="barList" style="min-width: 1050px; position: relative;"></div>
  <div id="tip" style="position: absolute; display: none; pointer-events: none; background: #2c2c2a; border: 0.5px solid #6a695f; border-radius: 8px; padding: 10px 14px; font-size: 14px; color: #ffffff; white-space: nowrap; z-index: 10; line-height: 1.7;"></div>
</div>
<script>
function fmtYM(dur) {
  let years = Math.floor(dur);
  let months = Math.round((dur - years) * 12);
  if (months === 12) { years += 1; months = 0; }
  if (years > 0 && months > 0) return years + '년 ' + months + '개월';
  if (years > 0) return years + '년';
  return months + '개월';
}
const simpleRows = [
  {name:'강인', group:'벌금형', dur:3.00, start:'2016.05', end:'2019.05', note:'웹드라마 복귀'},
  {name:'김현중', group:'벌금형', dur:1.58, start:'2017.03', end:'2018.10', note:'드라마 복귀'},
  {name:'구재이', group:'벌금형', dur:0.83, start:'2017.06', end:'2018.04', note:'드라마 복귀'},
  {name:'준케이', group:'벌금형', dur:2.83, start:'2018.02', end:'2020.12', note:'솔로 미니앨범 발매'},
  {name:'안재욱', group:'벌금형', dur:0.42, start:'2019.02', end:'2019.07', note:'연극 무대 복귀'},
  {name:'한동근', group:'벌금형', dur:1.33, start:'2018.09', end:'2020.01', note:'새 EP 발매'},
  {name:'임영민', group:'벌금형', dur:3.17, start:'2020.06', end:'2023.08', note:'솔로 EP 발매'},
  {name:'리지', group:'벌금형', dur:3.92, start:'2021.05', end:'2025.04', note:'일본 팬미팅 공연'},
  {name:'배성우', group:'벌금형', dur:3.42, start:'2020.12', end:'2024.05', note:'넷플릭스 더 에이트 쇼로 연기 복귀'},
  {name:'장원삼', group:'벌금형', dur:0.42, start:'2024.08', end:'2025.01', note:'방송 복귀 확인 안됨'},
  {name:'곽도원', group:'벌금형', dur:3.17, start:'2022.10', end:'2025.12', note:'직접 사과, 정식 복귀 확인 안됨'},
  {name:'김새론', group:'벌금형', dur:2.75, start:'2022.05', end:'2025.02', note:'복귀 시도 중 별세', deathTag:true},
  {name:'길(리쌍)', group:'징역형 집행유예', dur:2.50, start:'2017.07', end:'2020.01', note:'예능 복귀'},
  {name:'노우진', group:'징역형 집행유예', dur:4.08, start:'2020.07', end:'2024.08', note:'방송 활동 재개'},
  {name:'노엘(1차)', group:'징역형 집행유예', dur:1.58, start:'2019.09', end:'2021.04', note:'가요계 컴백'}
];
const prisonRows = [
  {name:'김호중', segs:[[0.10,'free'],[2.08,'jail']], start:'2024.05', end:'복귀 미정', det:'2024.05', rel:'2026.06 (가석방)', sentence:'징역형(실형)', dashColor:'#e34948', detail:'구속 2024.05 ~ 출소(가석방) 2026.06, 이후 복귀 미정(자숙 계속)', squareEnd:false},
  {name:'손승원', segs:[[0.08,'free'],[1.44,'jail']], start:'2018.12', end:'미복귀 (2차 수감 중)', det:'2018.12 (1차) / 2026.06 (2차)', rel:'2020.05 (1차) / 수감 중', sentence:'징역형(실형)', dashColor:'#f7c1c1', detail:'1차: 구속 2018.12~출소 2020.05 (실형 1.42년). 2차: 2026.05 다섯번째 음주운전, 2026.06 재차 법정구속(0.02년), 현재 수감 중. 두 실형 기간을 합쳐 표시', squareEnd:true},
  {name:'노엘(2차)', segs:[[0.75,'free'],[1.00,'jail']], start:'2021.09', end:'2023.06 가요계 재컴백', det:'2021.10', rel:'2022.10', sentence:'징역형(실형)', dashColor:null, detail:'구속 2021.10 ~ 출소 2022.10, 이후 2023.06 재컴백', squareEnd:false}
];
const colorMap = {'벌금형':'#2a78d6','징역형 집행유예':'#eda100'};
const jailColor = {'free':'#e34948','jail':'#f7c1c1'};
const pxPerYear = 120;
const axisMaxYear = 5;
const axisWidth = axisMaxYear * pxPerYear;
const labelW = 120, gapW = 14;
const avgDur = 2.30;
let html = '';

simpleRows.forEach((r) => {
  const color = colorMap[r.group];
  const w = Math.max(r.dur * pxPerYear, 6);
  const custody = (r.group === '벌금형') ? '없음' : '없음';
  const back = r.deathTag ? ('사망 (' + r.end + ')') : r.end;
  const info = '최초보도: ' + r.start + '&lt;br&gt;구속 일자: ' + custody + '&lt;br&gt;출소일: 없음&lt;br&gt;복귀: ' + back + '&lt;br&gt;형량: ' + r.group;
  html += '<div style="display:flex; align-items:center; gap:14px; padding:8px 0;">';
  html += '<div style="width:120px; flex-shrink:0; font-size:15px; color:#ffffff; text-align:right;">' + r.name + '</div>';
  html += '<div style="display:flex; align-items:center; height:32px;">';
  html += '<div class="bar" data-name="' + r.name + '" data-info="' + info + '" style="cursor:pointer; width:' + w.toFixed(0) + 'px; height:32px; background:' + color + '; border-radius:6px;"></div>';
  html += '<span style="font-size:15px; color:#c3c2b7; margin-left:10px;">' + fmtYM(r.dur) + (r.deathTag ? ' <span style="color:#e34948;">(사망)</span>' : '') + '</span>';
  html += '</div></div>';
});

prisonRows.forEach((r) => {
  const total = r.segs.reduce((a, s) => a + s[0], 0);
  const info = '최초보도: ' + r.start + '&lt;br&gt;구속 일자: ' + r.det + '&lt;br&gt;출소일: ' + r.rel + '&lt;br&gt;복귀: ' + r.end + '&lt;br&gt;형량: ' + r.sentence;
  let barEndPx = 0;
  html += '<div style="display:flex; align-items:center; gap:14px; padding:8px 0;">';
  html += '<div style="width:120px; flex-shrink:0; font-size:15px; color:#ffffff; text-align:right;">' + r.name + '</div>';
  html += '<div style="display:flex; align-items:center; height:32px;">';
  html += '<div class="bar" data-name="' + r.name + '" data-info="' + info + '" style="cursor:pointer; display:flex; height:32px; align-items:center;">';
  r.segs.forEach((seg, si) => {
    if (seg[0] <= 0) return;
    const w = Math.max(seg[0] * pxPerYear, 4);
    barEndPx += w;
    const isFirst = si === 0 || r.segs.slice(0, si).every(s => s[0] <= 0);
    const isLast = si === r.segs.length - 1;
    const leftR = isFirst ? '6px' : '0';
    const rightR = (isLast && !r.squareEnd) ? '6px' : '0';
    const radius = leftR + ' ' + rightR + ' ' + rightR + ' ' + leftR;
    html += '<div style="width:' + w.toFixed(0) + 'px; height:32px; background:' + jailColor[seg[1]] + '; border-radius:' + radius + '; margin-right:1px;"></div>';
  });
  if (r.dashColor) {
    const dashW = Math.max(axisWidth - barEndPx, 0);
    html += '<div style="width:' + dashW.toFixed(0) + 'px; height:32px; position:relative;">';
    html += '<div style="position:absolute; top:0; left:0; right:0; border-top:2px dashed ' + r.dashColor + ';"></div>';
    html += '<div style="position:absolute; bottom:0; left:0; right:0; border-bottom:2px dashed ' + r.dashColor + ';"></div>';
    html += '</div>';
  }
  html += '</div>';
  html += '<span style="font-size:15px; color:#c3c2b7; margin-left:10px;">' + fmtYM(total) + (r.dashColor ? '~' : '') + '</span>';
  html += '</div></div>';
});

function axisRow(maxYear) {
  let s = '<div style="display:flex; align-items:center; gap:14px; padding:10px 0 2px; border-top: 0.5px solid #6a695f; margin-top: 8px;">';
  s += '<div style="width:120px; flex-shrink:0;"></div>';
  s += '<div style="position:relative; height:20px; width:' + (maxYear * pxPerYear + 20) + 'px;">';
  for (let yr = 0; yr <= maxYear; yr++) {
    s += '<span style="position:absolute; left:' + (yr * pxPerYear) + 'px; font-size:13px; color:#a8a6a0;">' + yr + '년</span>';
  }
  s += '</div></div>';
  return s;
}

const avgLineLeft = labelW + gapW + avgDur * pxPerYear;
const avgLine = '<div style="position:absolute; left:' + avgLineLeft.toFixed(0) + 'px; top:0; bottom:26px; width:0; border-left:2px dashed #ffffff; opacity:0.9; pointer-events:none;"></div>';

document.getElementById('barList').innerHTML = avgLine + html + axisRow(axisMaxYear);

const tip = document.getElementById('tip');
const wrap = document.getElementById('barWrap');
document.querySelectorAll('.bar').forEach(function(el){
  el.addEventListener('mouseenter', function(){
    el.style.opacity = '0.75';
    tip.innerHTML = '<span style="font-weight:500;">' + el.getAttribute('data-name') + '</span><br>' + el.getAttribute('data-info');
    tip.style.display = 'block';
  });
  el.addEventListener('mousemove', function(e){
    const rect = wrap.getBoundingClientRect();
    tip.style.left = (e.clientX - rect.left + 14) + 'px';
    tip.style.top = (e.clientY - rect.top - 10) + 'px';
  });
  el.addEventListener('mouseleave', function(){
    el.style.opacity = '1';
    tip.style.display = 'none';
  });
});
</script>
</div>
</body>
</html>
